// ── File → base64 helper ─────────────────────────────────────
function readFileAsDataURL(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}
async function filesToDataURLs(files) {
  return Promise.all(Array.from(files).map((f) =>
    readFileAsDataURL(f).then((url) => ({ name: f.name, url }))
  ));
}

function extractHashtags(text) {
  return (text || "").match(/#[\w\u3000-\u9fff\uff00-\uffef-]+/g) || [];
}

// ── Setlist parser ──────────────────────────────────────────
const SECTION_KEYWORDS = /^(アンコール|encore|en\d*|本編|set\s*\d*|opening|se$)/i;
function parseSetlist(text) {
  // Returns array of { type:"header"|"song", text, num }
  if (!text) return [];
  const lines = text.split(/[\/\n]/).map(s => s.trim()).filter(Boolean);
  let songNum = 0;
  return lines.map(line => {
    if (SECTION_KEYWORDS.test(line)) {
      return { type:"header", text:line };
    }
    songNum++;
    return { type:"song", text:line, num:songNum };
  });
}
function parseSetlistSongs(text) {
  // Returns only song names (no headers)
  return parseSetlist(text).filter(r => r.type === "song").map(r => r.text);
}

function getCatInfo(id) { return SNS_CATEGORIES.find((c) => c.id === id) || SNS_CATEGORIES[0]; }
function getDaysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }
function getFirstDayOfMonth(y, m) { return new Date(y, m, 1).getDay(); }
function isSameDate(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}
function fmt(n) { return new Intl.NumberFormat("ja-JP").format(n); }

  snsPosts:   "wanima:snsPosts",
  tours:      "wanima:tours",

  favorites:  "wanima:favorites",
};

function storageGet(key) {
  try { return JSON.parse(localStorage.getItem(key)); } catch { return null; }
}
function storageSet(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}

function App() {
  const [page, setPage]           = useState("sns");
  const [sidebarOpen, setSidebar] = useState(true);
  const [loading, setLoading]     = useState(true);

  // Global data stores
  const [snsPosts,   setSnsPosts]   = useState(SAMPLE_SNS);
  const [tours,      setTours]      = useState(SAMPLE_TOURS);
  const [shows,      setShows]      = useState(SAMPLE_SHOWS);
  const [goodsTours, setGoodsTours] = useState(SAMPLE_GOODS_TOURS);
  const [goodsItems, setGoodsItems] = useState(SAMPLE_GOODS_ITEMS);
  const [mediaTypes, setMediaTypes] = useState(SAMPLE_MEDIA_TYPES);
  const [mediaItems, setMediaItems] = useState(SAMPLE_MEDIA_ITEMS);
  const [fcChannels, setFcChannels] = useState(SAMPLE_FC_CHANNELS);
  const [fcEntries,  setFcEntries]  = useState(SAMPLE_FC_ENTRIES);
  const [favorites,  setFavorites]  = useState(new Set()); // Set of "type:id"

  // ── Load from storage on mount ──
  useEffect(() => {
    const k = STORAGE_KEYS;
    const sp=storageGet(k.snsPosts), tr=storageGet(k.tours), sh=storageGet(k.shows);
    const gt=storageGet(k.goodsTours), gi=storageGet(k.goodsItems);
    const mt=storageGet(k.mediaTypes), mi=storageGet(k.mediaItems);
    const fc=storageGet(k.fcChannels), fe=storageGet(k.fcEntries);
    const fv=storageGet(k.favorites);
    if(sp)setSnsPosts(sp); if(tr)setTours(tr); if(sh)setShows(sh);
    if(gt)setGoodsTours(gt); if(gi)setGoodsItems(gi);
    if(mt)setMediaTypes(mt); if(mi)setMediaItems(mi);
    if(fc)setFcChannels(fc); if(fe)setFcEntries(fe);
    if(fv)setFavorites(new Set(fv));
    setLoading(false);
  }, []);

  // ── Auto-save whenever data changes ──
  useEffect(() => { if (!loading) storageSet(STORAGE_KEYS.snsPosts,   snsPosts);   }, [snsPosts,   loading]);
  useEffect(() => { if (!loading) storageSet(STORAGE_KEYS.tours,      tours);      }, [tours,      loading]);
  useEffect(() => { if (!loading) storageSet(STORAGE_KEYS.shows,      shows);      }, [shows,      loading]);
  useEffect(() => { if (!loading) storageSet(STORAGE_KEYS.goodsTours, goodsTours); }, [goodsTours, loading]);
  useEffect(() => { if (!loading) storageSet(STORAGE_KEYS.goodsItems, goodsItems); }, [goodsItems, loading]);
  useEffect(() => { if (!loading) storageSet(STORAGE_KEYS.mediaTypes, mediaTypes); }, [mediaTypes, loading]);
  useEffect(() => { if (!loading) storageSet(STORAGE_KEYS.mediaItems, mediaItems); }, [mediaItems, loading]);
  useEffect(() => { if (!loading) storageSet(STORAGE_KEYS.fcChannels,  fcChannels);  }, [fcChannels,  loading]);
  useEffect(() => { if (!loading) storageSet(STORAGE_KEYS.fcEntries,   fcEntries);   }, [fcEntries,   loading]);
  useEffect(() => { if (!loading) storageSet(STORAGE_KEYS.favorites,  [...favorites]); }, [favorites,  loading]);

  const toggleFav = (type, id) => setFavorites(prev => {
    const next = new Set(prev);
    const key = type+":"+id;
    if (next.has(key)) next.delete(key); else next.add(key);
    return next;
  });
  const isFav = (type, id) => favorites.has(type+":"+id);
  const pageProps = { snsPosts, setSnsPosts, tours, setTours, shows, setShows, goodsTours, setGoodsTours, goodsItems, setGoodsItems, mediaTypes, setMediaTypes, mediaItems, setMediaItems, fcChannels, setFcChannels, fcEntries, setFcEntries, toggleFav, isFav, favorites };

  if (loading) return (
    <div style={{ ...S.root, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:16, background:"#f5f2eb" }}>
      <div style={{ fontSize:36 }}>🎸</div>
      <div style={{ fontSize:14, color:"#888", letterSpacing:"0.1em" }}>LOADING ARCHIVE...</div>
      <div style={loadingBarStyle} />
    </div>
  );

  return (
    <div style={S.root}>
      <div style={S.noise} />

      {/* ── Top bar ── */}
      <header style={S.topbar}>
        <div style={S.topbarInner}>
          <button style={S.hamburger} onClick={() => setSidebar((v) => !v)}>
            <span style={{ ...S.hamLine, transform: sidebarOpen ? "rotate(45deg) translate(5px,5px)" : "none" }} />
            <span style={{ ...S.hamLine, opacity: sidebarOpen ? 0 : 1 }} />
            <span style={{ ...S.hamLine, transform: sidebarOpen ? "rotate(-45deg) translate(5px,-5px)" : "none" }} />
          </button>
          <div style={S.logo}>
            <span style={S.logoW}>W</span>
            <span style={S.logoRest}>ANIMA</span>
            <span style={S.logoSub}>ARCHIVE</span>
          </div>
          <div style={{ marginLeft:"auto", fontSize:10, color:"#999", letterSpacing:"0.06em" }}>
            💾 自動保存
          </div>
        </div>
      </header>

      <div style={S.body}>
        {/* ── Sidebar ── */}
        <aside style={{ ...S.sidebar, width: sidebarOpen ? 220 : 0, minWidth: sidebarOpen ? 220 : 0 }}>
          <div style={S.sidebarInner}>
            <div style={S.sideSection}>
              <div style={S.sideSectionLabel}>ARCHIVE</div>
              {NAV_PAGES.map((p) => (
                <button
                  key={p.id}
                  style={{ ...S.sideItem, ...(page === p.id ? S.sideItemActive : {}) }}
                  onClick={() => { setPage(p.id); if(window.innerWidth < 768) setSidebar(false); }}
                >
                  <span style={S.sideIcon}>{p.icon}</span>
                  <span>{p.label}</span>
                  {page === p.id && <span style={S.sideActiveDot} />}
                </button>
              ))}
            </div>

            <div style={S.sideFooter}>
              <div style={S.sideFooterText}>WANIMA FAN ARCHIVE</div>
              <div style={S.sideFooterSub}>Since 2025</div>
            </div>
          </div>
        </aside>

        {/* ── Main content ── */}
        <main style={S.main}>
          {page === "sns"     && <SnsPage     {...pageProps} />}
          {page === "live"    && <LivePage    {...pageProps} />}
          {page === "goods"   && <GoodsPage   goodsTours={goodsTours} setGoodsTours={setGoodsTours} goodsItems={goodsItems} setGoodsItems={setGoodsItems} toggleFav={toggleFav} isFav={isFav} />}
          {page === "media"   && <MediaPage   mediaTypes={mediaTypes} setMediaTypes={setMediaTypes} mediaItems={mediaItems} setMediaItems={setMediaItems} toggleFav={toggleFav} isFav={isFav} />}

}

function SnsPage({ snsPosts, setSnsPosts, toggleFav, isFav }) {

  const [searchQ,   setSearchQ]  = useState("");
  const [form, setForm] = useState({ category:"official_insta", type:"post", memo:"", date:today(), url:"", images:[], videos:[] });
  const [storyViewer, setStoryViewer] = useState(null);

    if (!form.memo && !form.url && !form.images.length && !form.videos.length) return;
    setSnsPosts((p) => [{ id:Date.now(), ...form }, ...p]);
    setForm({ category: tab==="insta" ? instaAcct : xAcct, type:"post", memo:"", date:today(), url:"", images:[], videos:[] });

    setSnsPosts((p) => p.filter((x) => x.id !== id));
    setSubView(tab==="insta" ? "grid" : "timeline");
    setSelected(null);
  };
  const handleFile = async (e, ft) => {
    const data = await filesToDataURLs(e.target.files);
    setForm((p) => ({ ...p, [ft]: [...p[ft], ...data] }));
    e.target.value = "";
  };

  const openDetail = (post) => { setSelected(post); setSubView("detail"); };

  // ストーリーを月ごとにグループ化

  const storyMonths = Object.keys(storyByMonth).sort((a,b) => a.localeCompare(b));

  // 投稿を月ごとにグループ化（インスタ用）
  const gridByMonth = gridPosts.reduce((acc, p) => {
    const ym = p.date.slice(0,7);
    if (!acc[ym]) acc[ym] = [];
    acc[ym].push(p);
    return acc;
  }, {});
  const gridMonths = Object.keys(gridByMonth).sort((a,b) => b.localeCompare(a));

  // X投稿を月ごとにグループ化
  const xFilteredRaw = xPostsRaw.filter(p => {
    const q = searchQ.toLowerCase();
    return !q || p.memo.toLowerCase().includes(q) || extractHashtags(p.memo).some(t => t.toLowerCase().includes(q));
  });
  const xByMonth = xFilteredRaw.reduce((acc, p) => {
    const ym = p.date.slice(0,7);
    if (!acc[ym]) acc[ym] = [];
    acc[ym].push(p);
    return acc;
  }, {});
  const xMonths = Object.keys(xByMonth).sort((a,b) => b.localeCompare(a));
  const allXTags = [...new Set(xPostsRaw.flatMap(p => extractHashtags(p.memo)))];

  const fmtMonth = (ym) => { const [y,m] = ym.split("-"); return `${y}/${m}`; };

  return (
    <div>

        <StoryViewer stories={storyViewer.stories} initialIndex={storyViewer.index}

            </>}
            <button style={S.addBtn} onClick={() => {

          </div>
        }
      />

      {/* メインタブ */}
      <div style={IS.mainTabRow}>
        <button style={{ ...IS.mainTab, ...(tab==="insta"?IS.mainTabActive:{}) }}
          onClick={() => { setTab("insta"); setSubView("grid"); setSearchQ(""); }}>📸 Instagram</button>
        <button style={{ ...IS.mainTab, ...(tab==="x"?IS.mainTabActive:{}) }}
          onClick={() => { setTab("x"); setSubView("timeline"); setSearchQ(""); }}>𝕏 X (Twitter)</button>
      </div>

      {/* 追加フォーム */}
      {subView === "add" && (
        <SnsAddForm form={form} setForm={setForm} imgRef={imgRef} vidRef={vidRef}
          handleFile={handleFile} removeFile={removeFile} handleAdd={handleAdd}
          onCancel={() => setSubView(tab==="insta"?"grid":"timeline")} />
      )}

      {/* 詳細 */}
      {subView === "detail" && selected && (
        <SnsDetail post={selected}
          onBack={() => setSubView(tab==="insta"?"grid":"timeline")}
          onDelete={handleDelete}

          onUpdate={(updated) => { setSnsPosts(p => p.map(x => x.id===updated.id?updated:x)); setSelected(updated); }}
          isFav={isFav("sns", selected.id)} onToggleFav={() => toggleFav("sns", selected.id)}
        />

      {/* ════ INSTAGRAM ════ */}
      {tab === "insta" && subView !== "add" && subView !== "detail" && (
        <div>
          {/* アカウント切り替え */}
          <div style={IS.acctRow}>
            {INSTA_ACCOUNTS.map(acct => (
              <button key={acct.id}
                style={{ ...IS.acctBtn, ...(instaAcct===acct.id?{ borderColor:acct.color, background:acct.color+"18" }:{}) }}
                onClick={() => { setInstaAcct(acct.id); setSubView("grid"); }}>
                <div style={{ ...IS.acctAvatar, background:instaAcct===acct.id?acct.color:"#ccc" }}>{acct.avatar}</div>
                <span style={{ fontSize:12, fontWeight:700, color:instaAcct===acct.id?acct.color:"#555" }}>{acct.label}</span>
              </button>

          </div>

          {/* お気に入り */}
          {subView === "favs" && (
            <div>
              <div style={{ fontSize:13, color:"#888", marginBottom:14 }}>♥ インスタお気に入り</div>
              {favPosts.filter(p => p.category.includes("insta")).length === 0

                : <InstaGrid posts={favPosts.filter(p => p.category.includes("insta"))} onSelect={openDetail} isFav={isFav} onToggleFav={id => toggleFav("sns",id)} />
              }
            </div>

          {/* グリッド or ストーリーアーカイブ */}
          {(subView === "grid" || subView === "story_cal") && (
            <div>
              {/* ストーリーハイライト＋アーカイブボタン */}
              {storyMonths.length > 0 && (
                <div style={IS.highlightSection}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom: subView==="story_cal" ? 0 : 10 }}>
                    <div style={IS.highlightLabel}>ストーリー</div>

                            </div>

                          </div>

                    <span style={IS.statNum}>{gridPosts.length}</span><span style={IS.statLbl}>投稿</span>
                    <span style={IS.statNum}>{storyPosts.length}</span><span style={IS.statLbl}>ストーリー</span>
                  </div>
                  {gridMonths.length === 0 ? <EmptyState /> : (
                    gridMonths.map(ym => (

      {/* ════ X ════ */}

          <div style={IS.acctRow}>

                <span style={{ fontSize:12, fontWeight:700, color:xAcct===acct.id?(acct.color||"#1a1a1a"):"#555" }}>{acct.label}</span>

          {/* 検索 */}
          <div style={{ ...S.searchBox, marginBottom:10 }}>

          {allXTags.length > 0 && (
            <div style={{ ...S.tagRow, marginBottom:14 }}>
              {allXTags.slice(0,12).map(t => (

                  onClick={() => setSearchQ(searchQ===t?"":t)}>{t}</button>

          {/* X投稿リスト（月ごと） */}

// ── ストーリービューアー ──────────────────────────────────────
function StoryViewer({ stories, initialIndex, onClose, onSelect }) {
  const [storyIdx, setStoryIdx] = useState(initialIndex); // どのストーリー
  const [pageIdx,  setPageIdx]  = useState(0);            // そのストーリー内のページ

  const story = stories[storyIdx];
  const acct  = INSTA_ACCOUNTS.find(a => a.id === story.category) || INSTA_ACCOUNTS[0];

  // ストーリー内のメディアリスト（画像→動画の順）
  const pages = [
    ...story.images.map(img => ({ type:"image", url:img.url, name:img.name })),
    ...story.videos.map(vid => ({ type:"video", url:vid.url, name:vid.name })),
  ];
  const currentPage = pages[pageIdx] || null;
  const totalPages  = pages.length;

  // ストーリー切り替え時にページをリセット
  const goStory = (newIdx) => { setStoryIdx(newIdx); setPageIdx(0); };

  const prev = () => {
    if (pageIdx > 0) {
      setPageIdx(v => v - 1);               // ページ内を戻る
    } else if (storyIdx > 0) {
      goStory(storyIdx - 1);                 // 前のストーリーへ
    }
  };

  const next = () => {
    if (pageIdx < totalPages - 1) {
      setPageIdx(v => v + 1);               // ページ内を進む
    } else if (storyIdx < stories.length - 1) {
      goStory(storyIdx + 1);                 // 次のストーリーへ
    } else {
      onClose();                             // 全部終わったら閉じる
    }
  };

  // タッチスワイプ
  const touchStart = useRef(null);
  const onTouchStart = (e) => { touchStart.current = e.touches[0].clientX; };
  const onTouchEnd   = (e) => {
    if (!touchStart.current) return;
    const dx = e.changedTouches[0].clientX - touchStart.current;
    if (dx > 50) prev();
    else if (dx < -50) next();
    touchStart.current = null;
  };

  return (
    <div style={IS.viewerOverlay} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>

      {/* ── 進行バー：ストーリー単位 ── */}
      <div style={IS.progressRow}>
        {stories.map((s, i) => {
          const sPages = s.images.length + s.videos.length || 1;
          return (
            <div key={i} style={{ flex:1, display:"flex", gap:2 }}>
              {Array.from({ length: sPages }).map((_, pi) => {
                const filled = i < storyIdx || (i === storyIdx && pi <= pageIdx);
                return (
                  <div key={pi} style={{ ...IS.progressBar, flex:1, background: filled ? "#fff" : "rgba(255,255,255,.35)" }} />
                );
              })}
            </div>
          );
        })}
      </div>

      {/* ── ヘッダー ── */}
      <div style={IS.viewerHeader}>
        <div style={{ ...IS.acctAvatar, background:acct.color, width:32, height:32, fontSize:14 }}>{acct.avatar}</div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:13, fontWeight:700, color:"#fff" }}>{acct.label}</div>
          <div style={{ fontSize:11, color:"rgba(255,255,255,.6)" }}>
            {story.date}
            {totalPages > 1 && <span style={{ marginLeft:6, opacity:.7 }}>{pageIdx+1} / {totalPages}</span>}
          </div>
        </div>
        <button style={IS.viewerClose} onClick={onClose}>✕</button>
      </div>

      {/* ── コンテンツ ── */}
      <div style={IS.viewerContent}>
        {currentPage ? (
          currentPage.type === "video"
            ? <video
                key={`${storyIdx}-${pageIdx}`}
                src={currentPage.url}
                controls loop playsInline autoPlay
                style={{ maxWidth:"100%", maxHeight:"100%", objectFit:"contain", display:"block" }}
              />
            : <img
                key={`${storyIdx}-${pageIdx}`}
                src={currentPage.url}
                alt=""
                style={IS.viewerImg}
              />
        ) : (
          <div style={IS.viewerNoImg}>
            <span style={{ fontSize:48 }}>📖</span>
            <div style={{ color:"rgba(255,255,255,.7)", fontSize:14, marginTop:12, textAlign:"center", padding:"0 24px", lineHeight:1.6 }}>
              {story.memo}
            </div>
          </div>
        )}
      </div>

      {/* ── メモ・タグ ── */}
      {currentPage && story.memo && (
        <div style={IS.viewerCaption}>
          <div style={{ fontSize:13, color:"rgba(255,255,255,.9)", lineHeight:1.6 }}>{story.memo}</div>
          {extractHashtags(story.memo).length > 0 && (
            <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginTop:6 }}>
              {extractHashtags(story.memo).map(t => <span key={t} style={{ fontSize:11, color:"rgba(255,255,255,.7)" }}>{t}</span>)}
            </div>
          )}
        </div>
      )}

      {/* 左右タップエリア */}
      <button style={IS.tapLeft}  onClick={prev} />
      <button style={IS.tapRight} onClick={next} />

      {/* 詳細ボタン */}
      <button style={IS.viewerDetail} onClick={() => { onClose(); setTimeout(() => onSelect(story), 50); }}>
        詳細を見る →
      </button>
    </div>
  );
}

// ── X投稿カード ───────────────────────────────────────────────
function XPostCard({ post, onClick, isFav, onToggleFav, onDelete }) {
  const cat = getCatInfo(post.category);
  const tags = extractHashtags(post.memo);
  return (
    <div style={IS.xCard} onClick={onClick}>
      <div style={IS.xCardHeader}>
        <div style={{ ...IS.xAvatar, background:cat.color }}>{cat.id.includes("kenta")?"K":"W"}</div>
        <div style={{ flex:1 }}>
          <div style={{ fontWeight:700, fontSize:13, color:"#1a1a1a" }}>{cat.label}</div>
          <div style={{ fontSize:11, color:"#999" }}>{post.date}</div>
        </div>
        <FavBtn active={isFav} onToggle={onToggleFav} size={16} />
        <button style={S.delBtn} onClick={(e) => { e.stopPropagation(); onDelete(post.id); }}>🗑</button>
      </div>
      {post.memo && <div style={IS.xCardMemo}>{post.memo}</div>}
      {tags.length > 0 && <div style={{ ...S.tagWrap, marginBottom:8 }}>{tags.map(t => <span key={t} style={{ ...S.tagPill, color:"#1565c0", background:"#e3f2fd", borderColor:"#90caf9" }}>{t}</span>)}</div>}
      {post.images.length > 0 && (
        <div style={{ display:"flex", gap:4, marginBottom:8, borderRadius:10, overflow:"hidden" }}>
          {post.images.slice(0,4).map((img,i) => (
            <img key={i} src={img.url} alt="" style={{ flex:1, height:post.images.length>1?100:180, objectFit:"cover", display:"block" }} />
          ))}
        </div>
      )}
      {post.url && (
        <div style={{ fontSize:11, color:"#1565c0", marginTop:4 }} onClick={e=>e.stopPropagation()}>
          <a href={post.url} target="_blank" rel="noopener noreferrer" style={{ color:"#1565c0", textDecoration:"none" }}>🔗 {post.url.slice(0,45)}{post.url.length>45?"…":""}</a>
        </div>
      )}
    </div>
  );
}

// ── SnsCalendar ────────────────────────────────────────────────
function SnsCalendar({ posts, onSelect, onStoryOpen }) {
  const todayDate = new Date();
  const [y, setY] = useState(todayDate.getFullYear());
  const [m, setM] = useState(todayDate.getMonth());
  const [selDay, setSelDay] = useState(null);
  const daysInMonth = getDaysInMonth(y, m);
  const firstDay = getFirstDayOfMonth(y, m);

  // 日付ごとに投稿を分類
  const byDate = {};
  posts.forEach((p) => { if (!byDate[p.date]) byDate[p.date] = []; byDate[p.date].push(p); });

  const MONTHS = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  const WD = ["日","月","火","水","木","金","土"];
  const cells = [...Array(firstDay).fill(null), ...Array.from({length:daysInMonth},(_,i)=>i+1)];
  const selStr = selDay ? `${y}-${String(m+1).padStart(2,"0")}-${String(selDay).padStart(2,"0")}` : null;
  const selPosts = selStr ? (byDate[selStr]||[]) : [];

  // Instagram風: ストーリーがある日はサムネ表示
  const acctColor = posts.length > 0 ? getCatInfo(posts[0].category).color : "#E1306C";

  const handleDayClick = (d, dp) => {
    if (!dp.length) return;
    const ds = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const stories = (byDate[ds]||[]).filter(p => p.type === "story");
    if (stories.length > 0 && onStoryOpen) {
      // ストーリーがある日はビューアー起動
      onStoryOpen(stories, 0);
    } else {
      setSelDay(selDay===d ? null : d);
    }
  };

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:20, marginBottom:12 }}>
        <button style={S.calNavBtn} onClick={()=>{ if(m===0){setY(v=>v-1);setM(11);}else setM(v=>v-1); setSelDay(null); }}>‹</button>
        <div style={{ textAlign:"center" }}>
          <div style={{ fontSize:13, color:"#666", fontWeight:600 }}>{y}</div>
          <div style={{ fontSize:22, fontWeight:800, color:"#1a1a1a" }}>{MONTHS[m]}</div>
        </div>
        <button style={S.calNavBtn} onClick={()=>{ if(m===11){setY(v=>v+1);setM(0);}else setM(v=>v+1); setSelDay(null); }}>›</button>
      </div>

      {/* 凡例 */}
      <div style={{ display:"flex", gap:12, justifyContent:"center", marginBottom:10, fontSize:11, color:"#aaa" }}>
        <span>🔵 投稿</span>
        <span style={{ color:acctColor }}>○ ストーリー（タップで再生）</span>
      </div>

      <div style={IS.storyCalGrid}>
        {WD.map((w,i)=>(
          <div key={w} style={{ textAlign:"center", fontSize:11, fontWeight:700, padding:"6px 0",
            color: i===0?"#b71c1c":i===6?"#1565c0":"#aaa" }}>{w}</div>
        ))}
        {cells.map((d, idx) => {
          if (!d) return <div key={`e${idx}`}/>;
          const ds = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
          const dp = byDate[ds]||[];
          const stories  = dp.filter(p => p.type === "story");
          const nonStory = dp.filter(p => p.type !== "story");
          const isT   = isSameDate(new Date(y,m,d), todayDate);
          const isSel = selDay===d;
          const thumb = stories.find(s => s.images.length > 0);
          const hasStory = stories.length > 0;
          const dayColor = idx%7===0?"#b71c1c":idx%7===6?"#1565c0":"#1a1a1a";

          return (
            <div key={d} style={{ display:"flex", flexDirection:"column", alignItems:"center", padding:"2px 1px", cursor:dp.length?"pointer":"default" }}
              onClick={() => handleDayClick(d, dp)}>
              {/* ストーリーがある日：丸いサムネ（Instagram風） */}
              {hasStory ? (
                <div style={{
                  width:46, height:46, borderRadius:"50%",
                  border:`2.5px solid ${acctColor}`,
                  padding:2, overflow:"hidden", position:"relative", flexShrink:0,
                  boxShadow: isT ? `0 0 0 2px #c8960a` : "none",
                }}>
                  {thumb
                    ? <img src={thumb.images[0].url} alt="" style={{ width:"100%", height:"100%", objectFit:"cover", borderRadius:"50%", display:"block" }} />
                    : <div style={{ width:"100%", height:"100%", borderRadius:"50%", background:acctColor+"22", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14 }}>📖</div>
                  }
                  {/* 日付 overlay */}
                  <div style={{ position:"absolute", bottom:0, right:0, background:"rgba(0,0,0,.55)", borderRadius:10, minWidth:16, textAlign:"center", fontSize:9, color:"#fff", fontWeight:800, lineHeight:"14px", padding:"0 2px" }}>{d}</div>
                </div>
              ) : (
                /* ストーリーなし：通常の日付表示 */
                <div style={{
                  width:46, height:46, borderRadius:"50%",
                  background: isSel ? "#1e7e34" : isT ? "#fff8e1" : "transparent",
                  border: isT && !isSel ? "2px solid #c8960a" : "2px solid transparent",
                  display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0,
                }}>
                  <span style={{ fontSize:13, fontWeight:isT?800:400, color: isSel?"#fff":dayColor }}>{d}</span>
                </div>
              )}
              {/* 投稿ドット */}
              {nonStory.length > 0 && (
                <div style={{ display:"flex", gap:2, marginTop:2, justifyContent:"center" }}>
                  {[...new Set(nonStory.map(p=>getCatInfo(p.category).color))].slice(0,3).map((col,i)=>(
                    <span key={i} style={{ width:4, height:4, borderRadius:"50%", background:col, display:"block" }}/>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* 選択日の投稿一覧（ストーリーなしの投稿のみ） */}
      {selDay && selPosts.filter(p=>p.type!=="story").length > 0 && (
        <div style={S.calPanel}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:12 }}>
            <span style={{ fontWeight:800, fontSize:15 }}>{y}年{m+1}月{selDay}日</span>
            <span style={{ fontSize:12, color:"#666" }}>{selPosts.filter(p=>p.type!=="story").length}件</span>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {selPosts.filter(p=>p.type!=="story").map((p)=>{
              const cat = getCatInfo(p.category);
              return (
                <div key={p.id} style={{ ...S.calPostRow, borderLeftColor:cat.color }} onClick={()=>onSelect(p)}>
                  <div style={{ display:"flex", gap:5, marginBottom:5, flexWrap:"wrap" }}>
                    <span style={{ ...S.badge, background:cat.color+"22", color:cat.color, borderColor:cat.color+"55" }}>{cat.icon} {cat.label}</span>
                  </div>
                  {p.images.length > 0 && <img src={p.images[0].url} alt="" style={{ width:"100%", height:80, objectFit:"cover", borderRadius:6, display:"block", marginBottom:4 }}/>}
                  <div style={{ fontSize:13, color:"#1a1a1a", lineHeight:1.5 }}>{p.memo||<span style={{opacity:.4}}>メモなし</span>}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}



function LivePage({ tours, setTours, shows, setShows, toggleFav, isFav }) {
  // layer: "tours" | "tour_detail" | "show_detail"
  const [layer,        setLayer]        = useState("tours"); // "tours"|"tour_detail"|"show_detail"|"stats"
  const [activeTour,   setActiveTour]   = useState(null);
  const [activeShow,   setActiveShow]   = useState(null);
  const [showForm,     setShowForm]     = useState("none"); // "none"|"tour"|"show"|"edit_tour"|"edit_show"
  const [confirm, dialog] = useConfirm();
  const [searchQ,      setSearchQ]      = useState("");

  // ── Tour form state ──
  const [tourForm, setTourForm] = useState({
    title:"", keyvisuals:[], officialUrl:"", ticketPrice:"", goodsImages:[],
  });
  const tourKVRef  = useRef();
  const tourGoodsRef = useRef();

  // ── Tour edit form state ──
  const [editTourForm, setEditTourForm] = useState(null);
  const editKVRef    = useRef();
  const editGoodsRef = useRef();

  // ── Show edit form state ──
  const [editShowForm, setEditShowForm] = useState(null);

  // ── Show form state ──
  const [showFormData, setShowFormData] = useState({
    date:today(), venue:"", place:"", attended:true,
    setlist:"", seat:"", memo:"", images:[], videos:[],
  });
  const showImgRef = useRef();
  const showVidRef = useRef();

  // ── Handlers: Tour ──
  const addTour = () => {
    if (!tourForm.title) return;
    setTours((p) => [{ id:Date.now(), createdAt:today(), ...tourForm }, ...p]);
    setTourForm({ title:"", keyvisuals:[], officialUrl:"", ticketPrice:"", goodsImages:[] });
    setShowForm("none");
  };
  const deleteTour = (id) => {
    setTours((p) => p.filter((t) => t.id !== id));
    setShows((p) => p.filter((s) => s.tourId !== id));
    setLayer("tours"); setActiveTour(null);
  };
  const saveTourEdit = () => {
    if (!editTourForm.title) return;
    setTours((p) => p.map((t) => t.id === editTourForm.id ? { ...editTourForm } : t));
    setActiveTour(editTourForm); // reflect in detail view instantly
    setShowForm("none");
    setEditTourForm(null);
  };
  const handleTourFile = async (e, field) => {
    const d = await filesToDataURLs(e.target.files);
    setTourForm((p) => ({ ...p, [field]: [...p[field], ...d] }));
    e.target.value = "";
  };
  const removeTourFile = (field, i) => setTourForm((p) => ({ ...p, [field]: p[field].filter((_,j)=>j!==i) }));
  const handleEditTourFile = async (e, field) => {
    const d = await filesToDataURLs(e.target.files);
    setEditTourForm((p) => ({ ...p, [field]: [...p[field], ...d] }));
    e.target.value = "";
  };
  const removeEditTourFile = (field, i) => setEditTourForm((p) => ({ ...p, [field]: p[field].filter((_,j)=>j!==i) }));

  // ── Handlers: Show ──
  const addShow = () => {
    if (!showFormData.venue) return;
    setShows((p) => [{ id:Date.now(), tourId:activeTour.id, ...showFormData }, ...p]);
    setShowFormData({ date:today(), venue:"", place:"", attended:true, setlist:"", seat:"", memo:"", images:[], videos:[] });
    setShowForm("none");
  };
  const deleteShow = (id) => {
    setShows((p) => p.filter((s) => s.id !== id));
    setLayer("tour_detail"); setActiveShow(null);
  };
  const handleShowFile = async (e, ft) => {
    const d = await filesToDataURLs(e.target.files);
    setShowFormData((p) => ({ ...p, [ft]: [...p[ft], ...d] }));
    e.target.value = "";
  };
  const removeShowFile = (ft, i) => setShowFormData((p) => ({ ...p, [ft]: p[ft].filter((_,j)=>j!==i) }));

  const tourShows = (t) => shows.filter((s) => s.tourId === t.id).sort((a,b) => a.date.localeCompare(b.date));
  const attendedShows = (t) => tourShows(t).filter((s) => s.attended);

  // ── Search filter for shows ──
  const filteredShows = activeTour
    ? tourShows(activeTour).filter((s) => {
        const q = searchQ.toLowerCase();
        return !q || s.venue.toLowerCase().includes(q) || s.memo.toLowerCase().includes(q) ||
          s.setlist.toLowerCase().includes(q) || extractHashtags(s.memo).some((t) => t.toLowerCase().includes(q));
      })
    : [];
  const allShowTags = activeTour
    ? [...new Set(tourShows(activeTour).flatMap((s) => extractHashtags(s.memo)))]
    : [];

  // ════════════════════════════════
  //  LAYER: ツアー一覧
  // ════════════════════════════════
  if (layer === "tours") return (
    <div>
      {dialog}
      <PageHeader icon="🎸" title="ライブ" subtitle="ツアー→公演の2層で管理"
        action={
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            <button style={{ ...S.tabBtn, ...(layer==="stats" ? S.tabBtnActive : {}) }}
              onClick={() => { setLayer(layer==="stats"?"tours":"stats"); setShowForm("none"); }}>
              📊 統計
            </button>
            <button style={{ ...S.tabBtn, ...(layer==="favs" ? S.tabBtnActive : {}) }}
              onClick={() => { setLayer(layer==="favs"?"tours":"favs"); setShowForm("none"); }}>
              ♥ お気に入り
            </button>
            <button style={S.addBtn} onClick={() => setShowForm(showForm==="tour"?"none":"tour")}>
              {showForm==="tour" ? "✕ キャンセル" : "＋ ツアーを追加"}
            </button>
          </div>
        }
      />

      {/* ── Tour add form ── */}
      {showForm==="tour" && (
        <div style={{ ...S.formCard, marginBottom:24 }}>
          <div style={LS.formSectionLabel}>① ツアー情報</div>
          <div style={S.fieldGroup}>
            <label style={S.fieldLabel}>ツアータイトル *</label>
            <input style={S.inputBase} placeholder="WANIMA ○○ TOUR 20XX" value={tourForm.title}
              onChange={(e) => setTourForm((p) => ({ ...p, title:e.target.value }))} />
          </div>
          <div style={S.formGrid2}>
            <div style={S.fieldGroup}>
              <label style={S.fieldLabel}>🔗 ツアー公式URL</label>
              <input type="url" style={S.inputBase} placeholder="https://wanima.net/tour/..."
                value={tourForm.officialUrl} onChange={(e) => setTourForm((p) => ({ ...p, officialUrl:e.target.value }))} />
            </div>
            <div style={S.fieldGroup}>
              <label style={S.fieldLabel}>チケット料金</label>
              <input style={S.inputBase} placeholder="¥7,700（スタンディング）"
                value={tourForm.ticketPrice} onChange={(e) => setTourForm((p) => ({ ...p, ticketPrice:e.target.value }))} />
            </div>
          </div>

          {/* Keyvisual upload */}
          <div style={S.fieldGroup}>
            <label style={S.fieldLabel}>🖼 キービジュアル</label>
            <input type="file" accept="image/*" multiple ref={tourKVRef} style={{ display:"none" }}
              onChange={(e) => handleTourFile(e, "keyvisuals")} />
            <button style={S.uploadBtn} onClick={() => tourKVRef.current.click()}>📷 画像をアップロード</button>
            {tourForm.keyvisuals.length > 0 && (
              <div style={LS.imagePreviewRow}>
                {tourForm.keyvisuals.map((img, i) => (
                  <div key={i} style={LS.previewWrap}>
                    <img src={img.url} alt="" style={LS.previewImg} />
                    <button style={S.removeBtn} onClick={() => removeTourFile("keyvisuals", i)}>✕</button>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Goods images */}
          <div style={S.fieldGroup}>
            <label style={S.fieldLabel}>🛍 グッズ画像</label>
            <input type="file" accept="image/*" multiple ref={tourGoodsRef} style={{ display:"none" }}
              onChange={(e) => handleTourFile(e, "goodsImages")} />
            <button style={S.uploadBtn} onClick={() => tourGoodsRef.current.click()}>📷 グッズ画像をアップロード</button>
            {tourForm.goodsImages.length > 0 && (
              <div style={LS.imagePreviewRow}>
                {tourForm.goodsImages.map((img, i) => (
                  <div key={i} style={LS.previewWrap}>
                    <img src={img.url} alt="" style={LS.previewImg} />
                    <button style={S.removeBtn} onClick={() => removeTourFile("goodsImages", i)}>✕</button>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
            <button style={S.cancelBtn} onClick={() => setShowForm("none")}>キャンセル</button>
            <button style={{ ...S.saveBtn, ...(!tourForm.title ? S.saveBtnOff : {}) }} onClick={addTour}>
              ツアーを作成 ✓
            </button>
          </div>
        </div>
      )}

      {/* ── Tour cards ── */}
      {tours.length === 0 ? <EmptyState /> : (
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          {tours.map((tour) => {
            const ts = tourShows(tour);
            const att = attendedShows(tour);
            return (
              <div key={tour.id} style={LS.tourCard} onClick={() => { setActiveTour(tour); setLayer("tour_detail"); setSearchQ(""); }}>
                {/* KV strip */}
                {tour.keyvisuals.length > 0 && (
                  <div style={LS.tourKVStrip}>
                    <img src={tour.keyvisuals[0].url} alt="" style={LS.tourKVImg} />
                    <div style={LS.tourKVOverlay} />
                  </div>
                )}
                <div style={{ padding:"16px 18px" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:10, flexWrap:"wrap" }}>
                    <div>
                      <div style={{ fontWeight:900, fontSize:16, color:"#1a1a1a", letterSpacing:"0.03em", marginBottom:6 }}>{tour.title}</div>
                      <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                        {tour.ticketPrice && <span style={S.infoBadge}>🎟 {tour.ticketPrice}</span>}
                        {tour.officialUrl && <span style={S.infoBadge}>🔗 公式サイトあり</span>}
                      </div>
                    </div>
                    <button style={S.delBtn} onClick={(e) => { e.stopPropagation(); confirm("このツアーを削除しますか？\n公演データも全て削除されます。",()=>deleteTour(tour.id)); }}>🗑</button>
                  </div>
                  <div style={LS.tourStats}>
                    <div style={LS.tourStatItem}>
                      <span style={LS.tourStatNum}>{ts.length}</span>
                      <span style={LS.tourStatLabel}>公演</span>
                    </div>
                    <div style={LS.tourStatDivider} />
                    <div style={LS.tourStatItem}>
                      <span style={{ ...LS.tourStatNum, color:"#4ec94e" }}>{att.length}</span>
                      <span style={LS.tourStatLabel}>参加</span>
                    </div>
                    <div style={LS.tourStatDivider} />
                    <div style={LS.tourStatItem}>
                      <span style={{ ...LS.tourStatNum, color:"#777" }}>{ts.length - att.length}</span>
                      <span style={LS.tourStatLabel}>未参加</span>
                    </div>
                    {tour.goodsImages.length > 0 && (
                      <>
                        <div style={LS.tourStatDivider} />
                        <div style={LS.tourStatItem}>
                          <span style={LS.tourStatNum}>🛍 {tour.goodsImages.length}</span>
                          <span style={LS.tourStatLabel}>グッズ画像</span>
                        </div>
                      </>
                    )}
                  </div>
                  {/* upcoming shows preview */}
                  {ts.length > 0 && (
                    <div style={{ marginTop:10, display:"flex", flexDirection:"column", gap:4 }}>
                      {ts.slice(0,3).map((s) => (
                        <div key={s.id} style={LS.showPreviewRow}>
                          <span style={{ ...LS.attendDot, background: s.attended ? "#4ec94e" : "#aaa" }} />
                          <span style={{ fontSize:11, color:"#555", minWidth:84 }}>{s.date}</span>
                          <span style={{ fontSize:12, color:"#333", fontWeight:600 }}>{s.venue}</span>
                          <span style={{ fontSize:11, color:"#777", marginLeft:4 }}>{s.place}</span>
                        </div>
                      ))}
                      {ts.length > 3 && <div style={{ fontSize:11, color:"#888", paddingLeft:12 }}>他 {ts.length-3} 公演…</div>}
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );

  // ════════════════════════════════
  //  LAYER: ツアー詳細（公演一覧）
  // ════════════════════════════════
  if (layer === "tour_detail" && activeTour) return (
    <div>
      {dialog}
      {/* Breadcrumb */}
      <div style={LS.breadcrumb}>
        <button style={LS.breadcrumbBtn} onClick={() => { setLayer("tours"); setActiveTour(null); setShowForm("none"); setSearchQ(""); }}>
          🎸 ライブ
        </button>
        <span style={LS.breadcrumbSep}>›</span>
        <span style={LS.breadcrumbCurrent}>{activeTour.title}</span>
      </div>

      {/* Tour header card */}
      <div style={LS.tourDetailHeader}>
        {activeTour.keyvisuals.length > 0 && (
          <div style={LS.tourDetailKV}>
            {activeTour.keyvisuals.map((img, i) => (
              <img key={i} src={img.url} alt="" style={LS.tourDetailKVImg} />
            ))}
          </div>
        )}
        <div style={{ padding:"18px 20px" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8 }}>
            <h2 style={{ fontSize:20, fontWeight:900, margin:"0 0 10px", color:"#1a1a1a", letterSpacing:"0.04em" }}>{activeTour.title}</h2>
            <button
              style={LS.editBtn}
              onClick={() => {
                setEditTourForm({ ...activeTour });
                setShowForm(showForm === "edit_tour" ? "none" : "edit_tour");
              }}
            >
              {showForm === "edit_tour" ? "✕" : "✏️ 編集"}
            </button>
          </div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:12 }}>
            {activeTour.ticketPrice && <span style={S.infoBadge}>🎟 {activeTour.ticketPrice}</span>}
            {activeTour.officialUrl && (
              <a href={activeTour.officialUrl} target="_blank" rel="noopener noreferrer"
                style={{ ...S.infoBadge, color:"#7ec8ff", textDecoration:"none" }} onClick={(e)=>e.stopPropagation()}>
                🔗 公式サイト
              </a>
            )}
          </div>

          {/* Goods images */}
          {activeTour.goodsImages.length > 0 && (
            <div style={{ marginTop:4 }}>
              <div style={S.sectionTitle}>🛍 グッズ</div>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginTop:6 }}>
                {activeTour.goodsImages.map((img, i) => (
                  <img key={i} src={img.url} alt="" style={{ width:80, height:60, objectFit:"cover", borderRadius:6, border:"1px solid rgba(255,255,255,.1)" }} />
                ))}
              </div>
            </div>
          )}

          <div style={LS.tourStats}>
            <div style={LS.tourStatItem}>
              <span style={LS.tourStatNum}>{tourShows(activeTour).length}</span>
              <span style={LS.tourStatLabel}>公演</span>
            </div>
            <div style={LS.tourStatDivider} />
            <div style={LS.tourStatItem}>
              <span style={{ ...LS.tourStatNum, color:"#4ec94e" }}>{attendedShows(activeTour).length}</span>
              <span style={LS.tourStatLabel}>参加</span>
            </div>
          </div>
        </div>
      </div>

      {/* ── Tour edit form ── */}
      {showForm === "edit_tour" && editTourForm && (
        <div style={{ ...S.formCard, marginBottom:20 }}>
          <div style={LS.formSectionLabel}>✏️ ツアー情報を編集</div>
          <div style={S.fieldGroup}>
            <label style={S.fieldLabel}>ツアータイトル *</label>
            <input style={S.inputBase} value={editTourForm.title}
              onChange={(e) => setEditTourForm((p) => ({ ...p, title:e.target.value }))} />
          </div>
          <div style={S.formGrid2}>
            <div style={S.fieldGroup}>
              <label style={S.fieldLabel}>🔗 ツアー公式URL</label>
              <input type="url" style={S.inputBase} placeholder="https://wanima.net/tour/..."
                value={editTourForm.officialUrl}
                onChange={(e) => setEditTourForm((p) => ({ ...p, officialUrl:e.target.value }))} />
            </div>
            <div style={S.fieldGroup}>
              <label style={S.fieldLabel}>チケット料金</label>
              <input style={S.inputBase} placeholder="¥7,700（スタンディング）"
                value={editTourForm.ticketPrice}
                onChange={(e) => setEditTourForm((p) => ({ ...p, ticketPrice:e.target.value }))} />
            </div>
          </div>

          {/* Edit keyvisuals */}
          <div style={S.fieldGroup}>
            <label style={S.fieldLabel}>🖼 キービジュアル</label>
            <input type="file" accept="image/*" multiple ref={editKVRef} style={{ display:"none" }}
              onChange={(e) => handleEditTourFile(e, "keyvisuals")} />
            <button style={S.uploadBtn} onClick={() => editKVRef.current.click()}>📷 画像を追加</button>
            {editTourForm.keyvisuals.length > 0 && (
              <div style={LS.imagePreviewRow}>
                {editTourForm.keyvisuals.map((img, i) => (
                  <div key={i} style={LS.previewWrap}>
                    <img src={img.url} alt="" style={LS.previewImg} />
                    <button style={S.removeBtn} onClick={() => removeEditTourFile("keyvisuals", i)}>✕</button>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Edit goods images */}
          <div style={S.fieldGroup}>
            <label style={S.fieldLabel}>🛍 グッズ画像</label>
            <input type="file" accept="image/*" multiple ref={editGoodsRef} style={{ display:"none" }}
              onChange={(e) => handleEditTourFile(e, "goodsImages")} />
            <button style={S.uploadBtn} onClick={() => editGoodsRef.current.click()}>📷 グッズ画像を追加</button>
            {editTourForm.goodsImages.length > 0 && (
              <div style={LS.imagePreviewRow}>
                {editTourForm.goodsImages.map((img, i) => (
                  <div key={i} style={LS.previewWrap}>
                    <img src={img.url} alt="" style={LS.previewImg} />
                    <button style={S.removeBtn} onClick={() => removeEditTourFile("goodsImages", i)}>✕</button>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
            <button style={S.cancelBtn} onClick={() => { setShowForm("none"); setEditTourForm(null); }}>キャンセル</button>
            <button style={{ ...S.saveBtn, ...(!editTourForm.title ? S.saveBtnOff : {}) }} onClick={saveTourEdit}>
              保存する ✓
            </button>
          </div>
        </div>
      )}

      {/* Show add button + search */}
      <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:14, flexWrap:"wrap" }}>
        <div style={{ ...S.searchBox, flex:1, marginBottom:0 }}>
          <span>🔍</span>
          <input style={S.searchInput} placeholder="会場・セトリ・#タグで検索..." value={searchQ}
            onChange={(e) => setSearchQ(e.target.value)} />
          {searchQ && <button style={S.clearBtn} onClick={() => setSearchQ("")}>✕</button>}
        </div>
        <button style={S.addBtn} onClick={() => setShowForm(showForm==="show"?"none":"show")}>
          {showForm==="show" ? "✕ キャンセル" : "＋ 公演を追加"}
        </button>
      </div>

      {/* hashtag quick filters */}
      {allShowTags.length > 0 && (
        <div style={{ ...S.tagRow, marginBottom:14 }}>
          {allShowTags.slice(0,12).map((t) => (
            <button key={t} style={{ ...S.hashChip, ...(searchQ===t ? S.hashChipActive : {}) }}
              onClick={() => setSearchQ(searchQ===t?"":t)}>{t}</button>
          ))}
        </div>
      )}

      {/* ── Show add form ── */}
      {showForm==="show" && (
        <div style={{ ...S.formCard, marginBottom:20 }}>
          <div style={LS.formSectionLabel}>② 公演情報</div>
          <div style={S.formGrid2}>
            <div style={S.fieldGroup}>
              <label style={S.fieldLabel}>公演日 *</label>
              <input type="date" style={S.inputBase} value={showFormData.date}
                onChange={(e) => setShowFormData((p) => ({ ...p, date:e.target.value }))} />
            </div>
            <div style={S.fieldGroup}>
              <label style={S.fieldLabel}>会場 *</label>
              <input style={S.inputBase} placeholder="日本武道館" value={showFormData.venue}
                onChange={(e) => setShowFormData((p) => ({ ...p, venue:e.target.value }))} />
            </div>
            <div style={S.fieldGroup}>
              <label style={S.fieldLabel}>開催地</label>
              <input style={S.inputBase} placeholder="東京" value={showFormData.place}
                onChange={(e) => setShowFormData((p) => ({ ...p, place:e.target.value }))} />
            </div>
            <div style={S.fieldGroup}>
              <label style={S.fieldLabel}>参加 / 未参加</label>
              <div style={{ display:"flex", gap:8 }}>
                {[{v:true,l:"✅ 参加した"},{v:false,l:"⬜ 参加しなかった"}].map((o) => (
                  <button key={String(o.v)}
                    style={{ ...S.typeBtn, ...(showFormData.attended===o.v ? { borderColor: o.v?"#4ec94e":"#888", background: o.v?"rgba(78,201,78,.15)":"rgba(255,255,255,.06)", color: o.v?"#4ec94e":"#444" } : {}) }}
                    onClick={() => setShowFormData((p) => ({ ...p, attended:o.v }))}
                  >{o.l}</button>
                ))}
              </div>
            </div>
          </div>

          {showFormData.attended && (
            <>
              <div style={S.fieldGroup}>
                <label style={S.fieldLabel}>🎫 座席・チケット情報</label>
                <input style={S.inputBase} placeholder="アリーナ A-12列 / スタンド 3塁側 C-88" value={showFormData.seat}
                  onChange={(e) => setShowFormData((p) => ({ ...p, seat:e.target.value }))} />
              </div>
            </>
          )}

          <div style={S.fieldGroup}>
            <label style={S.fieldLabel}>🎵 セットリスト <span style={{opacity:.5,fontSize:11}}>（参加・未参加問わず記録できます）</span></label>
            <textarea style={S.textarea} rows={5}
              placeholder={"1曲ずつ改行 or スラッシュ区切り\nRemember / Charm / THANK YOU\nまたは\nRemember\nCharm\nTHANK YOU"}
              value={showFormData.setlist} onChange={(e) => setShowFormData((p) => ({ ...p, setlist:e.target.value }))} />
          </div>

          <div style={S.fieldGroup}>
            <label style={S.fieldLabel}>メモ <span style={{opacity:.5,fontSize:11}}>#タグも使えます</span></label>
            <textarea style={S.textarea} rows={3} value={showFormData.memo}
              onChange={(e) => setShowFormData((p) => ({ ...p, memo:e.target.value }))} />
            {extractHashtags(showFormData.memo).length > 0 && (
              <div style={{ ...S.tagWrap, marginTop:6 }}>
                {extractHashtags(showFormData.memo).map((t) => <span key={t} style={S.tagPill}>{t}</span>)}
              </div>
            )}
          </div>

          <FileUploadRow label="画像" accept="image/*" inputRef={showImgRef} files={showFormData.images}
            onUpload={(e) => handleShowFile(e,"images")} onRemove={(i) => removeShowFile("images",i)} icon="📷" isImage />
          <FileUploadRow label="動画" accept="video/*" inputRef={showVidRef} files={showFormData.videos}
            onUpload={(e) => handleShowFile(e,"videos")} onRemove={(i) => removeShowFile("videos",i)} icon="🎬" />

          <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
            <button style={S.cancelBtn} onClick={() => setShowForm("none")}>キャンセル</button>
            <button style={{ ...S.saveBtn, ...(!showFormData.venue ? S.saveBtnOff : {}) }} onClick={addShow}>
              公演を追加 ✓
            </button>
          </div>
        </div>
      )}

      {/* ── Show list ── */}
      {filteredShows.length === 0 && showForm !== "show" ? <EmptyState /> : (
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          {filteredShows.map((show) => (
            <div key={show.id} style={{ ...LS.showCard, ...(show.attended ? LS.showCardAttended : LS.showCardAbsent) }}
              onClick={() => { setActiveShow(show); setLayer("show_detail"); }}>
              <div style={LS.showCardLeft}>
                <div style={{ ...LS.attendPill, background: show.attended ? "rgba(78,201,78,.15)" : "rgba(255,255,255,.05)", color: show.attended ? "#4ec94e" : "#888", border: `1px solid ${show.attended ? "rgba(78,201,78,.3)" : "rgba(255,255,255,.1)"}` }}>
                  {show.attended ? "✅ 参加" : "⬜ 未参加"}
                </div>
                <div style={LS.showDate}>{show.date}</div>
              </div>
              <div style={LS.showCardBody}>
                <div style={{ fontWeight:800, fontSize:15, color:"#1a1a1a", marginBottom:4 }}>{show.venue}</div>
                <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom: show.seat||extractHashtags(show.memo).length?"6px":0 }}>
                  {show.place && <span style={S.infoBadge}>📍 {show.place}</span>}
                  {show.seat  && <span style={S.infoBadge}>🎫 {show.seat}</span>}
                </div>
                {show.setlist && (
                  <div style={{ fontSize:11, color:"#666", marginBottom:4 }}>
                    🎵 {show.setlist.split(/[/\n]/)[0].trim()}{show.setlist.split(/[/\n]/).length>1?"…":""}
                  </div>
                )}
                {extractHashtags(show.memo).length > 0 && (
                  <div style={S.tagWrap}>{extractHashtags(show.memo).map((t)=><span key={t} style={S.tagPill}>{t}</span>)}</div>
                )}
                {(show.images?.length>0||show.videos?.length>0) && (
                  <div style={{ display:"flex", gap:5, marginTop:4 }}>
                    {show.images?.length>0 && <span style={S.mediaBadge}>🖼 {show.images.length}</span>}
                    {show.videos?.length>0 && <span style={S.mediaBadge}>🎬 {show.videos.length}</span>}
                  </div>
                )}
              </div>
              <button style={{ ...S.delBtn, alignSelf:"flex-start" }} onClick={(e) => { e.stopPropagation(); deleteShow(show.id); }}>🗑</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );

  // ════════════════════════════════
  //  LAYER: 公演詳細
  // ════════════════════════════════
  if (layer === "show_detail" && activeShow) return (
    <div>
      {/* Breadcrumb */}
      <div style={LS.breadcrumb}>
        <button style={LS.breadcrumbBtn} onClick={() => { setLayer("tours"); setActiveTour(null); setSearchQ(""); }}>
          🎸 ライブ
        </button>
        <span style={LS.breadcrumbSep}>›</span>
        <button style={LS.breadcrumbBtn} onClick={() => { setLayer("tour_detail"); setActiveShow(null); }}>
          {activeTour.title}
        </button>
        <span style={LS.breadcrumbSep}>›</span>

// ── LiveStats component ─────────────────────────────────────
function LiveStats({ tours, shows }) {
  const attendedShows = shows.filter(s => s.attended);

  // 年ごとの参加数
  const byYear = attendedShows.reduce((acc, s) => {
    const y = s.date.slice(0,4);
    acc[y] = (acc[y]||0) + 1;
    return acc;
  }, {});
  const years = Object.keys(byYear).sort();
  const maxYear = Math.max(...Object.values(byYear), 1);

  // 曲ごとの演奏回数
  const songCount = {};
  attendedShows.forEach(s => {
    parseSetlistSongs(s.setlist).forEach(song => {
      const key = song.trim();
      if (key) songCount[key] = (songCount[key]||0) + 1;
    });
  });
  const songRanking = Object.entries(songCount).sort((a,b) => b[1]-a[1]).slice(0,20);
  const maxSong = songRanking[0]?.[1] || 1;

  // ツアーごとのセトリ
  const tourSetlists = tours.map(tour => {
    const ts = shows.filter(s => s.tourId===tour.id && s.attended && s.setlist);
    const songs = [...new Set(ts.flatMap(s => parseSetlistSongs(s.setlist)))];
    return { tour, songs, showCount:ts.length };
  }).filter(t => t.songs.length > 0);

  // アンコール限定曲
  const encoreOnlySongs = (() => {
    const allShows = attendedShows.filter(s => s.setlist);
    const encoreSongs = new Set(); const mainSongs = new Set();
    allShows.forEach(s => {
      let inEncore = false;
      parseSetlist(s.setlist).forEach(row => {
        if (row.type==="header") inEncore = true;
        else if (inEncore) encoreSongs.add(row.text);
        else mainSongs.add(row.text);
      });
    });
    return [...encoreSongs].filter(s => !mainSongs.has(s));
  })();

  const RC = ["#b71c1c","#c8960a","#1e7e34"];
  const card = { background:"#fff", border:"1px solid #ddd8cc", borderRadius:12, padding:20, boxShadow:"0 1px 4px rgba(0,0,0,.04)" };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:20 }}>

      {/* サマリー */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))", gap:12 }}>
        {[
          { label:"参加ライブ数", value:attendedShows.length, icon:"🎸", color:"#1e7e34" },
          { label:"ツアー数",     value:tours.length,          icon:"🗓", color:"#c8960a" },
          { label:"記録曲数",     value:Object.keys(songCount).length, icon:"🎵", color:"#b71c1c" },
          { label:"未参加公演",   value:shows.filter(s=>!s.attended).length, icon:"📋", color:"#888" },
        ].map(st => (
          <div key={st.label} style={{ ...card, padding:"14px 12px", textAlign:"center" }}>
            <div style={{ fontSize:22, marginBottom:4 }}>{st.icon}</div>
            <div style={{ fontSize:26, fontWeight:900, color:st.color, lineHeight:1 }}>{st.value}</div>
            <div style={{ fontSize:11, color:"#888", marginTop:4 }}>{st.label}</div>
          </div>
        ))}
      </div>

      {/* 年ごとの参加数 */}
      <div style={card}>
        <div style={{ fontWeight:800, fontSize:15, color:"#1a1a1a", marginBottom:14 }}>📅 年ごとのライブ参加数</div>
        {years.length === 0 ? <div style={{ color:"#aaa", fontSize:13 }}>参加記録がありません</div> : (
          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            {years.map((y, idx) => (
              <div key={y} style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ fontSize:13, fontWeight:700, color:"#555", minWidth:44 }}>{y}</div>
                <div style={{ flex:1, background:"#f0ede6", borderRadius:6, height:28, overflow:"hidden" }}>
                  <div style={{ height:"100%", borderRadius:6, background:RC[idx%3], width:(byYear[y]/maxYear*100)+"%",
                    display:"flex", alignItems:"center", justifyContent:"flex-end", paddingRight:8 }}>
                    <span style={{ fontSize:12, fontWeight:800, color:"#fff" }}>{byYear[y]}</span>
                  </div>
                </div>
                <div style={{ fontSize:12, color:"#888", minWidth:28 }}>{byYear[y]}回</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* 演奏回数ランキング */}
      <div style={card}>
        <div style={{ fontWeight:800, fontSize:15, color:"#1a1a1a", marginBottom:14 }}>🏆 演奏回数ランキング（参加公演）</div>
        {songRanking.length === 0 ? <div style={{ color:"#aaa", fontSize:13 }}>セトリデータがありません</div> : (
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {songRanking.map(([song, cnt], idx) => (
              <div key={song} style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ minWidth:26, height:26, borderRadius:7, display:"flex", alignItems:"center", justifyContent:"center",
                  background: idx===0?"#c8960a":idx===1?"#aaa":idx===2?"#c87533":"#f0ede6",
                  color: idx<3?"#fff":"#888", fontSize:10, fontWeight:900, flexShrink:0 }}>{idx+1}</div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:13, fontWeight:700, color:"#1a1a1a", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", marginBottom:3 }}>{song}</div>
                  <div style={{ background:"#f0ede6", borderRadius:4, height:5, overflow:"hidden" }}>
                    <div style={{ height:"100%", background:RC[idx%3], width:(cnt/maxSong*100)+"%" }} />
                  </div>
                </div>
                <div style={{ fontSize:13, fontWeight:800, color:"#555", minWidth:30, textAlign:"right" }}>{cnt}回</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* ツアーごとのセトリ比較 */}
      {tourSetlists.length > 0 && (
        <div style={card}>
          <div style={{ fontWeight:800, fontSize:15, color:"#1a1a1a", marginBottom:14 }}>🎸 ツアーごとのセトリ</div>
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            {tourSetlists.map(({ tour, songs, showCount }, idx) => (
              <div key={tour.id} style={{ borderLeft:"3px solid "+RC[idx%3], paddingLeft:12 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                  <div style={{ fontWeight:800, fontSize:13, color:"#1a1a1a" }}>{tour.title}</div>
                  <span style={{ fontSize:11, color:"#888" }}>{showCount}公演 / {songs.length}曲</span>
                </div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
                  {songs.map(song => {
                    const cnt = songCount[song]||0;
                    return (
                      <span key={song} style={{ fontSize:11, padding:"3px 8px", borderRadius:4, fontWeight:600,
                        background: cnt>=3?"#e8f5e9": cnt>=2?"#fff8e1":"#f5f2eb",
                        color:      cnt>=3?"#1e7e34": cnt>=2?"#7a5c00":"#555",
                        border:     "1px solid "+(cnt>=3?"#a5d6a7": cnt>=2?"#ffe082":"#ddd8cc") }}>
                        {song}
                      </span>
                    );
                  })}
                </div>
              </div>
            ))}
            <div style={{ fontSize:11, color:"#aaa" }}>🟢 3回以上　🟡 2回　⬜ 1回のみ</div>
          </div>
        </div>
      )}

      {/* アンコール限定曲 */}
      {encoreOnlySongs.length > 0 && (
        <div style={card}>
          <div style={{ fontWeight:800, fontSize:15, color:"#1a1a1a", marginBottom:4 }}>🎤 アンコール限定曲</div>
          <div style={{ fontSize:11, color:"#aaa", marginBottom:10 }}>本編では演奏されなかった曲</div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
            {encoreOnlySongs.map(song => (
              <span key={song} style={{ fontSize:12, padding:"4px 10px", borderRadius:6, background:"#fce4e4", border:"1px solid #ef9a9a", color:"#b71c1c", fontWeight:700 }}>{song}</span>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

  const emptyItem = { name:"", category:"衣類", keyvisual:null, subImages:[], price:"", date:today(), status:"所持", memo:"", url:"", urls:[""] };
  const [itemForm, setItemForm] = useState(emptyItem);
